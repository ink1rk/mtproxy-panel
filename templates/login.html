{% extends "base.html" %}
{% block title %}Вход — MTProxy Control Panel{% endblock %}
{% block body %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card-surface p-4 p-md-5" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock" style="font-size: 2.2rem; color: var(--brand);"></i>
            <h1 class="h4 mt-2 mb-0">MTProxy Control Panel</h1>
            <p class="text-secondary small mb-0">Войдите, чтобы управлять прокси</p>
        </div>

        {% if error_message %}
        <div class="alert alert-danger py-2" role="alert">{{ error_message }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label small text-secondary">Логин</label>
                <input type="text" name="username" class="form-control" required autofocus autocomplete="username">
            </div>
            <div class="mb-4">
                <label class="form-label small text-secondary">Пароль</label>
                <input type="password" name="password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn brand-gradient-btn text-white w-100 py-2">
                Войти
            </button>
        </form>
    </div>
</div>
{% endblock %}
